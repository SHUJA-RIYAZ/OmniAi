<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      body {
        font-family: system-ui, sans-serif;
        width: 280px;
        padding: 12px;
        margin: 0;
      }
      button {
        width: 100%;
        padding: 8px;
        font-size: 13px;
        cursor: pointer;
      }
      #status {
        margin-top: 8px;
        font-size: 12px;
        color: #555;
        min-height: 1.2em;
      }
      #status.error {
        color: #b00020;
      }
      #preview {
        margin-top: 8px;
        padding: 8px;
        max-height: 320px;
        overflow: auto;
        font-size: 11px;
        background: #f6f6f6;
        border: 1px solid #ddd;
        white-space: pre-wrap;
      }
    </style>
  </head>
  <body>
    <button id="insert">Insert editor context into this page</button>
    <div id="status"></div>
    <pre id="preview" hidden></pre>
    <script type="module" src="popup.js"></script>
  </body>
</html>
